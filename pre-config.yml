# This playbook does some basic pre-configuration of the Linodes prior to Ceph installation. In particular, it:
#
# - updates packages
# - sets up log rotation
# - configures the core dump location for easy retrieval via other ansible playbooks
# - ensures OSD devices are wiped (handled by playbooks/wipe-osds.yml);
#   this is necessary after nuking the cluster as Linode does not wipe the disks
#   immediately after deletion.

---

- hosts: all
  become: yes
  tasks:
  - name: set hostname
    ansible.builtin.hostname:
      name: "{{ inventory_hostname }}"

  - name: create hosts from inventory
    become: no
    shell: ./misc/generate-hosts.py linodes
    register: etchosts
    run_once: true
    delegate_to: localhost

  - name: add to /etc/hosts
    blockinfile:
      block: "{{ etchosts.stdout }}"
      path: /etc/hosts

  - name: add to /etc/hosts
    blockinfile:
      block: "{{ etchosts.stdout }}"
      path: /etc/hosts
    ignore_errors: yes
    run_once: true
    delegate_to: localhost

  - name: Fix broken CentOS Stream repositories mirror
    ansible.builtin.shell:
      cmd: |
        if grep -q "http://mirrors.adn.networklayer.com" /etc/yum.repos.d/centos.repo; then
          echo "Detected problematic mirror. Reinstalling centos-stream-repos and centos-gpg-keys..."
          # Remove broken repo files before reinstalling
          rm -f /etc/yum.repos.d/centos.repo /etc/yum.repos.d/centos-addons.repo
          # Download official repos and keys
          # Note: We use --force and --nodeps to ensure we overwrite the broken ones even if dnf is in a weird state
          MAJOR="{{ ansible_distribution_major_version }}"
          URL="https://mirror.stream.centos.org/${MAJOR}-stream/BaseOS/x86_64/os/Packages/"
          REPO_PKG=$(curl -s $URL | grep -oE "centos-stream-repos-${MAJOR}\.[0-9]-[0-9]+\.el${MAJOR}\.noarch\.rpm" | tail -1)
          GPG_PKG=$(curl -s $URL | grep -oE "centos-gpg-keys-${MAJOR}\.[0-9]-[0-9]+\.el${MAJOR}\.noarch\.rpm" | tail -1)
          if [ -n "$REPO_PKG" ] && [ -n "$GPG_PKG" ]; then
            rpm -ivh --force --nodeps ${URL}${REPO_PKG} ${URL}${GPG_PKG}
          else
            echo "Failed to find repo or GPG packages for CentOS Stream ${MAJOR}"
            exit 1
          fi
        fi
    when: ansible_distribution == 'CentOS' and ansible_distribution_major_version | int >= 9
    ignore_errors: yes

  - name: Fix broken Rocky Linux repositories
    ansible.builtin.shell:
      cmd: |
        if grep -q "http://mirrors.adn.networklayer.com" /etc/yum.repos.d/rocky*.repo; then
          echo "Detected problematic mirror. Reinstalling rocky-repos..."
          # Capture current version of rocky-repos
          VERSION_SPEC=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' rocky-repos)
          # Remove all files added by rocky-repos before reinstalling
          rpm -ql rocky-repos | grep -E '^/etc/yum.repos.d/.*repo' | xargs rm -f
          # Download and install official repo package
          # Note: We use --force and --nodeps to ensure we overwrite the broken ones even if dnf is in a weird state
          URL="https://download.rockylinux.org/pub/rocky/10/BaseOS/x86_64/os/Packages/r/rocky-repos-${VERSION_SPEC}.rpm"
          rpm -ivh --force --nodeps ${URL}
        fi
    when: ansible_distribution == 'Rocky' and ansible_distribution_major_version | int >= 10
    ignore_errors: yes

  # coredump capture setup
  - name: create crash directory
    file:
      path: /crash
      state: directory
      owner: root
      group: root
      mode: 1777

  - name: set core_pattern
    sysctl:
      name: kernel.core_pattern
      value: /crash/%e-%h-%p-%t.core

  - name: add DefaultLimitCORE=infinity
    lineinfile:
      path: /etc/systemd/system.conf
      line: DefaultLimitCORE=infinity
      create: yes
    register: coreline

  - name: reexec systemd
    shell: systemctl daemon-reexec
    when: coreline.changed

  - name: download EPEL GPG key
    get_url:
      url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
      dest: "/tmp/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
      mode: '0644'

  - name: import EPEL GPG key
    shell: "rpm --import /tmp/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"

  - name: download EPEL-NEXT GPG key (best-effort)
    get_url:
      url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
      dest: "/tmp/RPM-GPG-KEY-EPEL-NEXT-{{ ansible_distribution_major_version }}"
      mode: '0644'
    ignore_errors: yes
    when: ansible_distribution_major_version | int < 10

  - name: import EPEL-NEXT GPG key (best-effort)
    shell: "rpm --import /tmp/RPM-GPG-KEY-EPEL-NEXT-{{ ansible_distribution_major_version }}"
    ignore_errors: yes
    when: ansible_distribution_major_version | int < 10

  - name: install epel-release RPMs
    yum:
      name:
        - "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
        - "https://dl.fedoraproject.org/pub/epel/epel-next-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
      state: present
      update_cache: yes
    when: ansible_distribution_major_version | int < 10

  - name: install epel-release RPMs (RHEL 10+)
    yum:
      name:
        - "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
      state: present
      update_cache: yes
    when: ansible_distribution_major_version | int >= 10

  - name: clean up epel repo exclude (avoid DuplicateOptionError)
    shell: "sed -i '/^\\[epel\\]/,/^\\[/ { /^exclude=/ d }' /etc/yum.repos.d/epel.repo"
    ignore_errors: yes
    when: ansible_distribution_major_version | int >= 9

  # IBM/RH Ceph ships its own parquet/libarrow/thrift/re2 (el*cp) builds that
  # conflict with EPEL. Exclude those only in IBM mode.
  # Community Ceph does *not* ship them and needs EPEL to satisfy
  # ceph-common → libparquet.so.* (and related) dependencies.
  - name: enable epel repo
    yum_repository:
      name: epel
      description: "Extra Packages for Enterprise Linux {{ ansible_distribution_major_version }} - $basearch"
      metalink: "https://mirrors.fedoraproject.org/metalink?repo=epel-{{ ansible_distribution_major_version }}&arch=$basearch"
      enabled: yes
      gpgcheck: yes
      gpgkey: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
      exclude: "python3-grpcio*,grpc-data*{{ ',re2*,parquet-libs*,libarrow*,thrift*' if (ansible_distribution_major_version | int >= 9 and (use_ibm_storage_ceph | default(false) | bool)) else '' }}"
      state: present

  - name: Download standalone cephadm binary (community mode)
    ansible.builtin.get_url:
      url: "https://download.ceph.com/rpm-{{ RELEASE }}/el{{ ansible_distribution_major_version }}/noarch/cephadm"
      dest: /usr/local/sbin/cephadm-bootstrap
      owner: root
      group: root
      mode: '0755'
    when:
      - not (use_ibm_storage_ceph | default(false) | bool)
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Add community Ceph repository (community mode)
    ansible.builtin.command:
      cmd: "/usr/local/sbin/cephadm-bootstrap add-repo {{ CEPHADM_REPO }}"
      creates: /etc/yum.repos.d/ceph.repo
    when:
      - not (use_ibm_storage_ceph | default(false) | bool)
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  # `cephadm add-repo` from the tentacle build points gpgkey at release.gpg,
  # but download.ceph.com only serves release.asc (release.gpg 404s).
  - name: Fix ceph.repo gpgkey URL (release.gpg -> release.asc)
    ansible.builtin.replace:
      path: /etc/yum.repos.d/ceph.repo
      regexp: '/keys/release\.gpg'
      replace: '/keys/release.asc'
    when:
      - not (use_ibm_storage_ceph | default(false) | bool)
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Remove IBM Storage Ceph repository (community mode)
    ansible.builtin.file:
      path: /etc/yum.repos.d/ibm-storage-ceph.repo
      state: absent
    when:
      - not (use_ibm_storage_ceph | default(false) | bool)
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Add IBM Storage Ceph repository (RHEL/CentOS/Rocky 9/10)
    ansible.builtin.get_url:
      url: "https://public.dhe.ibm.com/ibmdl/export/pub/storage/ceph/ibm-storage-ceph-9-rhel-{{ ansible_distribution_major_version }}.repo"
      dest: /etc/yum.repos.d/ibm-storage-ceph.repo
      owner: root
      group: root
      mode: '0644'
    when:
      - use_ibm_storage_ceph | default(false) | bool
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Install IBM Storage Ceph license (RHEL/CentOS/Rocky 9/10)
    ansible.builtin.command:
      cmd: dnf install -y ibm-storage-ceph-license
      creates: /usr/share/ibm-storage-ceph-license
    when:
      - use_ibm_storage_ceph | default(false) | bool
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Accept IBM license
    ansible.builtin.file:
      path: /usr/share/ibm-storage-ceph-license
      state: directory
      owner: root
      group: root
      mode: '0755'
    when:
      - use_ibm_storage_ceph | default(false) | bool
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: Touch IBM license accept file
    ansible.builtin.file:
      path: /usr/share/ibm-storage-ceph-license/accept
      state: touch
      owner: root
      group: root
      mode: '0644'
    when:
      - use_ibm_storage_ceph | default(false) | bool
      - ansible_distribution in ["RedHat", "CentOS", "Rocky"]
      - ansible_distribution_major_version | int >= 9

  - name: clean up epel-next repo exclude (avoid DuplicateOptionError)
    shell: "if [ -f /etc/yum.repos.d/epel-next.repo ]; then sed -i '/^\\[epel-next\\]/,/^\\[/ { /^exclude=/ d }' /etc/yum.repos.d/epel-next.repo; fi"
    ignore_errors: yes
    when: ansible_distribution_major_version | int >= 9

  - name: enable epel-next repo (if available)
    yum_repository:
      name: epel-next
      description: "EPEL Next for Enterprise Linux {{ ansible_distribution_major_version }} - $basearch"
      metalink: "https://mirrors.fedoraproject.org/metalink?repo=epel-next-{{ ansible_distribution_major_version }}&arch=$basearch"
      enabled: yes
      gpgcheck: yes
      gpgkey: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
      exclude: "python3-grpcio*,grpc-data*{{ ',re2*,parquet-libs*,libarrow*,thrift*' if (ansible_distribution_major_version | int >= 9 and (use_ibm_storage_ceph | default(false) | bool)) else '' }}"
      state: present
    ignore_errors: yes
    when: ansible_distribution_major_version | int < 10

  # OS prep only: never upgrade the Ceph stack here. A plain dnf update with
  # Ceph/IBM/RHCEPH repos enabled fails on RHEL 10, e.g.:
  # - community Ceph librados/librbd needing liblttng-ust.so.1
  # - EPEL thrift/parquet vs installed el10cp thrift/parquet conflicts
  # - cephadm-ansible file conflicts between 4.x and 5.x
  # ansible dnf disablerepo=*ceph* is not reliable enough (errors still show
  # packages "from Ceph"), so stash repo files + package excludes instead.
  - name: OS package update (Ceph stack excluded)
    when: ansible_distribution in ['CentOS', 'RedHat', 'Rocky']
    block:
      - name: Stash Ceph-related yum repo files during OS update
        ansible.builtin.shell: |
          set -eu
          mkdir -p /etc/yum.repos.d/.disabled-os-update
          # Community (ceph.repo), IBM, and any other *ceph* file-based repos
          find /etc/yum.repos.d -maxdepth 1 -type f -iname '*ceph*.repo' -print0 \
            | xargs -0 -r mv -t /etc/yum.repos.d/.disabled-os-update/
          # RHSM-managed Ceph repos (rhceph-*-rpms, etc.)
          : > /etc/yum.repos.d/.disabled-os-update/rhsm-ceph-repos.list
          if command -v subscription-manager >/dev/null 2>&1; then
            while read -r rid; do
              [ -n "${rid}" ] || continue
              subscription-manager repos --disable="${rid}" || true
              echo "${rid}" >> /etc/yum.repos.d/.disabled-os-update/rhsm-ceph-repos.list
            done < <(
              subscription-manager repos --list-enabled 2>/dev/null \
                | awk -F': ' '/Repo ID:/{print $2}' \
                | grep -iE 'ceph|rhceph' || true
            )
          fi
        args:
          executable: /bin/bash

      - name: Update all packages
        ansible.builtin.dnf:
          name: "*"
          state: latest
          # Do not touch Ceph packages or shared libs that conflict across
          # community / IBM / EPEL stacks during OS prep.
          exclude:
            - ceph
            - ceph.*
            - ceph-*
            - librados*
            - librbd*
            - librgw*
            - libceph*
            - python3-ceph*
            - python3-rados*
            - python3-rbd*
            - python3-rgw*
            - cephadm*
            - thrift
            - thrift*
            - parquet-libs*
            - libarrow*
            - re2*
        register: upgrade_all

    always:
      - name: Restore Ceph-related yum repos after OS update
        ansible.builtin.shell: |
          set -eu
          if [ -d /etc/yum.repos.d/.disabled-os-update ]; then
            find /etc/yum.repos.d/.disabled-os-update -maxdepth 1 -type f -name '*.repo' -print0 \
              | xargs -0 -r mv -t /etc/yum.repos.d/
          fi
          if [ -f /etc/yum.repos.d/.disabled-os-update/rhsm-ceph-repos.list ]; then
            while read -r rid; do
              [ -n "${rid}" ] || continue
              subscription-manager repos --enable="${rid}" 2>/dev/null || true
            done < /etc/yum.repos.d/.disabled-os-update/rhsm-ceph-repos.list
          fi
        args:
          executable: /bin/bash

  - name: Reboot nodes after update
    ansible.builtin.reboot:
      reboot_timeout: 300
    when:
      - ansible_distribution in ['CentOS', 'RedHat', 'Rocky']
      - upgrade_all is defined
      - upgrade_all is changed

  - name: Install systemtap and related packages
    ansible.builtin.dnf:
      name:
        - systemtap
        - systemtap-runtime
        - elfutils-debuginfod-client
      state: present
    when: ansible_distribution_major_version | int >= 9

  - name: Run stap-prep
    ansible.builtin.shell:
      cmd: stap-prep
    when: ansible_distribution_major_version | int >= 9
    ignore_errors: yes

  - name: Configure debuginfod for Rocky Linux 10
    ansible.builtin.copy:
      dest: /etc/profile.d/debuginfod.sh
      content: |
        export DEBUGINFOD_URLS="https://debuginfod.centos.org/ https://debuginfod.fedoraproject.org/"
      owner: root
      group: root
      mode: '0644'
    when: ansible_distribution == 'Rocky' and ansible_distribution_major_version | int >= 10

  - name: Configure debuginfod for CentOS Stream 10
    ansible.builtin.copy:
      dest: /etc/profile.d/debuginfod.sh
      content: |
        export DEBUGINFOD_URLS="https://debuginfod.centos.org/"
      owner: root
      group: root
      mode: '0644'
    when: ansible_distribution == 'CentOS' and ansible_distribution_major_version | int >= 10

  # package setup
  # - logrotate needs psmisc for killall
  # - ceph-ansible needs EPEL but also needs ca-certificates installed to avoid some errors, do this now
  - name: install launcher packages
    yum:
      name: logrotate,psmisc,ca-certificates,python3,chrony,podman,lvm2,firewalld
      state: latest

  # log rotation setup
  - name: copy ceph-logrotate.timer
    copy: src=ceph-log-rotate.timer dest=/etc/systemd/system/ owner=root group=root mode=644

  - name: copy ceph-logrotate.service
    copy: src=ceph-log-rotate.service dest=/etc/systemd/system/ owner=root group=root mode=644

  - name: copy ceph logrotate config
    copy: src=ceph.logrotate dest=/etc/logrotate.d/ceph owner=root group=root mode=644

 # Ideally we would use the ceph-logrotate.timer but systemd has a bug requiring cron
  - name: copy crontab
    copy: src=crontab dest=/root/ owner=root group=root mode=644
  - name: register crontab
    shell: crontab /root/crontab

  - name: enable ntp
    systemd:
      enabled: yes
      name: chronyd
      state: started

- hosts: mdss
  become: yes
  tasks:
  - name: check for mds logrotate config
    local_action: stat path="ceph-mds.logrotate"
    register: ceph_mds_logrotate
    become: false

  - name: copy ceph mds logrotate config
    copy: src=ceph-mds.logrotate dest=/etc/logrotate.d/ceph owner=root group=root mode=644
    when: ceph_mds_logrotate.stat.exists


- hosts: mons
  become: yes
  tasks:
  - name: check for mon logrotate config
    local_action: stat path="ceph-mon.logrotate"
    register: ceph_mon_logrotate
    become: false

  - name: copy ceph mon logrotate config
    copy: src=ceph-mon.logrotate dest=/etc/logrotate.d/ceph owner=root group=root mode=644
    when: ceph_mon_logrotate.stat.exists

- hosts: clients ganeshas
  become: yes
  tasks:
  - name: install nfs-utils
    yum: name=nfs-utils state=latest update_cache=yes

- import_playbook: iptables.yml
